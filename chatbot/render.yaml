# render.yaml — defines your Render services
# Commit this to your repo. Render reads it automatically.

services:
  - type: web
    name: chatbot-api
    runtime: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "chatbot-api.onrender.com"   # update with your actual Render URL
      - key: DATABASE_URL
        sync: false                  # set manually in Render dashboard (Supabase URL)
      - key: OPENAI_API_KEY
        sync: false                  # set manually in Render dashboard
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_DOMAIN
        sync: false
    healthCheckPath: /ping/
    autoDeploy: true                 # deploy on every push to main branch