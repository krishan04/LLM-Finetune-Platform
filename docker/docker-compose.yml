version: '3.8'

services:
  db:
    image: postgres:15
    container_name: llm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llm_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: llm_redis
    ports:
      - "6379:6379"